name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Build canonical browser application
        run: |
          make web-install web-build
          node scripts/check-web-assets.mjs --no-embedded

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-web-dist
          path: web/dist/
          include-hidden-files: true

  build-linux:
    needs: build-web
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            runner: ubuntu-latest
            go_arch_name: amd64
          - goarch: arm64
            runner: ubuntu-24.04-arm
            go_arch_name: arm64
    runs-on: ${{ matrix.runner }}
    container:
      image: ubuntu:22.04

    steps:
      - name: Install build tools
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update
          # libsqlite3-dev provides sqlite3.h, which sqlite-vec's CGo
          # binding includes unconditionally with -DSQLITE_CORE. mattn's
          # sqlite3 driver still links its own bundled amalgamation at
          # runtime; the header is only needed at compile time.
          apt-get install -y gcc g++ make git curl tar gzip file binutils libsqlite3-dev

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Go
        run: |
          GO_VERSION=$(grep '^go ' go.mod | awk '{print $2}')
          curl -fsSL "https://go.dev/dl/go${GO_VERSION}.linux-${{ matrix.go_arch_name }}.tar.gz" -o go.tar.gz
          tar -C /usr/local -xzf go.tar.gz
          rm go.tar.gz
          echo "/usr/local/go/bin" >> "$GITHUB_PATH"
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Install browser asset validator
        run: |
          export PATH="/usr/local/go/bin:$HOME/go/bin:$PATH"
          make web-install

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-web-dist
          path: web/dist

      - name: Stage canonical browser application
        run: |
          mkdir -p internal/web/dist
          find internal/web/dist -mindepth 1 -maxdepth 1 ! -name stub.html -exec rm -rf {} +
          cp -R web/dist/. internal/web/dist/
          node scripts/check-web-assets.mjs

      - name: Build
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '1'
        run: |
          export PATH="/usr/local/go/bin:$HOME/go/bin:$PATH"
          VERSION=${GITHUB_REF#refs/tags/v}

          mkdir -p dist
          LDFLAGS="-s -w -X go.kenn.io/msgvault/cmd/msgvault/cmd.Version=v${VERSION} -X go.kenn.io/msgvault/cmd/msgvault/cmd.Commit=$(printf '%s' "$GITHUB_SHA" | cut -c1-8) -X go.kenn.io/msgvault/cmd/msgvault/cmd.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ) -extldflags '-lstdc++ -lm'"
          go build -tags "fts5 sqlite_vec" -trimpath -buildvcs=false -ldflags="$LDFLAGS" -o dist/msgvault ./cmd/msgvault

          echo "--- Binary info ---"
          file dist/msgvault
          ldd dist/msgvault || true

          # Verify runtime version requirements are reasonable. DuckDB's
          # prebuilt static library still links against libstdc++ symbols.
          echo "--- Runtime requirements ---"
          objdump -T dist/msgvault 2>/dev/null | grep -oP 'GLIBC_\d+\.\d+' | sort -uV | tail -1 || true
          objdump -T dist/msgvault 2>/dev/null | grep -oP 'GLIBCXX_\d+\.\d+(\.\d+)?' | sort -uV | tail -1 || true

          # Smoke test
          echo "--- Smoke test ---"
          SMOKE_OUT=$(dist/msgvault version 2>&1)
          echo "$SMOKE_OUT"
          echo "$SMOKE_OUT" | grep -q "v${VERSION}" || { echo "FATAL: version output doesn't match tag"; exit 1; }

          node scripts/check-web-assets.mjs --binary dist/msgvault \
            --json "dist/web-assets-linux-${{ matrix.goarch }}.json"

          cd dist
          ARCHIVE="msgvault_${VERSION}_linux_${{ matrix.goarch }}.tar.gz"
          tar czf "$ARCHIVE" msgvault
          rm msgvault

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: msgvault-linux-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/web-assets-*.json

  build-darwin:
    needs: build-web
    strategy:
      matrix:
        include:
          - goarch: amd64
            runner: macos-15
          - goarch: arm64
            runner: macos-15
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Install browser asset validator
        run: make web-install

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-web-dist
          path: web/dist

      - name: Stage canonical browser application
        run: |
          mkdir -p internal/web/dist
          find internal/web/dist -mindepth 1 -maxdepth 1 ! -name stub.html -exec rm -rf {} +
          cp -R web/dist/. internal/web/dist/
          node scripts/check-web-assets.mjs

      - name: Build
        env:
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}

          mkdir -p dist
          LDFLAGS="-s -w -X go.kenn.io/msgvault/cmd/msgvault/cmd.Version=v${VERSION} -X go.kenn.io/msgvault/cmd/msgvault/cmd.Commit=$(printf '%s' "$GITHUB_SHA" | cut -c1-8) -X go.kenn.io/msgvault/cmd/msgvault/cmd.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          go build -tags "fts5 sqlite_vec" -trimpath -ldflags="$LDFLAGS" -o dist/msgvault ./cmd/msgvault

          echo "--- Binary info ---"
          file dist/msgvault

          # Verify no libstdc++ dependency (macOS should only link libc++ and system libs)
          echo "--- Dynamic libraries ---"
          otool -L dist/msgvault
          if otool -L dist/msgvault | grep -q 'libstdc++'; then
            echo "FATAL: binary links libstdc++ — this will cause compatibility issues"
            exit 1
          fi

          # Smoke test — only for native arch (amd64 is cross-compiled from arm64)
          NATIVE_ARCH=$(uname -m)
          if [ "${{ matrix.goarch }}" = "arm64" ] && [ "$NATIVE_ARCH" = "arm64" ]; then
            echo "--- Smoke test ---"
            SMOKE_OUT=$(dist/msgvault version 2>&1)
            echo "$SMOKE_OUT"
            echo "$SMOKE_OUT" | grep -q "v${VERSION}" || { echo "FATAL: version output doesn't match tag"; exit 1; }
          else
            echo "--- Smoke test skipped (cross-compiled) ---"
          fi

          node scripts/check-web-assets.mjs --binary dist/msgvault \
            --json "dist/web-assets-darwin-${{ matrix.goarch }}.json"

          cd dist
          ARCHIVE="msgvault_${VERSION}_darwin_${{ matrix.goarch }}.tar.gz"
          tar czf "$ARCHIVE" msgvault
          rm msgvault

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: msgvault-darwin-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/web-assets-*.json

  build-windows:
    needs: build-web
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            runner: windows-latest
          - goarch: arm64
            runner: windows-11-arm
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Install browser asset validator
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Push-Location web
          try {
            bun install --frozen-lockfile
            if ($LASTEXITCODE -ne 0) { throw "bun install failed with exit code $LASTEXITCODE" }
          } finally {
            Pop-Location
          }

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-web-dist
          path: web/dist

      - name: Stage canonical browser application
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $staged = Join-Path $env:GITHUB_WORKSPACE 'internal/web/dist'
          New-Item -ItemType Directory -Path $staged -Force | Out-Null
          Get-ChildItem -LiteralPath $staged -Force |
            Where-Object Name -ne 'stub.html' |
            Remove-Item -Recurse -Force
          Get-ChildItem -LiteralPath (Join-Path $env:GITHUB_WORKSPACE 'web/dist') -Force |
            Copy-Item -Destination $staged -Recurse -Force
          node scripts/check-web-assets.mjs

      # sqlite-vec's CGo bindings need sqlite3.h at compile time and
      # arrow-go/v18's cdata helpers need GNU89 inline semantics on
      # MinGW; see .github/workflows/ci.yml for details.
      - name: Install sqlite3 dev headers
        if: matrix.goarch == 'amd64'
        shell: pwsh
        run: |
          C:\msys64\usr\bin\pacman.exe -S --noconfirm --needed mingw-w64-x86_64-sqlite3

      - name: Setup llvm-mingw and sqlite3 headers
        if: matrix.goarch == 'arm64'
        shell: pwsh
        env:
          # Self-contained ARM64 MinGW toolchain for cgo. The archive is pinned
          # by version and digest so release builds do not execute unverified
          # compiler binaries.
          LLVM_MINGW_VERSION: "20260602"
          LLVM_MINGW_NAME: llvm-mingw-20260602-ucrt-aarch64
          LLVM_MINGW_SHA256: cb5c20fbe1808e31ada5cbe4efd9daa2fee19c91dac6ec5ca1ac46a9c7247e37
        run: |
          $ErrorActionPreference = 'Stop'
          $zip = Join-Path $env:RUNNER_TEMP 'llvm-mingw.zip'
          $url = "https://github.com/mstorsjo/llvm-mingw/releases/download/$env:LLVM_MINGW_VERSION/$env:LLVM_MINGW_NAME.zip"
          Invoke-WebRequest -Uri $url -OutFile $zip
          $actual = (Get-FileHash -Path $zip -Algorithm SHA256).Hash
          if ($actual -ne $env:LLVM_MINGW_SHA256) {
            throw "Checksum mismatch for $url`n  expected $env:LLVM_MINGW_SHA256`n  actual   $actual"
          }
          7z x $zip -o"$env:RUNNER_TEMP" | Out-Null

          $bin = Join-Path $env:RUNNER_TEMP "$env:LLVM_MINGW_NAME\bin"
          $cc = Join-Path $bin 'aarch64-w64-mingw32-clang.exe'
          if (-not (Test-Path $cc)) { throw "CC not found at $cc" }
          Add-Content -Path $env:GITHUB_PATH -Value $bin
          Add-Content -Path $env:GITHUB_ENV -Value "CC=$cc"

          # sqlite-vec includes sqlite3.h while compiling as SQLITE_CORE. Use
          # the header bundled with go-sqlite3 so it exactly matches the SQLite
          # amalgamation linked into this binary.
          $sqliteModule = (go mod download -json github.com/mattn/go-sqlite3 | ConvertFrom-Json).Dir
          if (-not $sqliteModule) { throw 'go-sqlite3 module directory not found' }
          $include = Join-Path $env:RUNNER_TEMP 'sqlite-include'
          New-Item -ItemType Directory -Path $include -Force | Out-Null
          Copy-Item (Join-Path $sqliteModule 'sqlite3-binding.h') (Join-Path $include 'sqlite3.h')


      - name: Build static DuckDB for ARM64
        if: matrix.goarch == 'arm64'
        shell: pwsh
        env:
          # duckdb-go v2.10504.0 uses DuckDB 1.5.4. Pin the source commit so
          # the release remains reproducible even if the tag is moved.
          DUCKDB_VERSION: "1.5.4"
          DUCKDB_COMMIT: 08e34c447bae34eaee3723cac61f2878b6bdf787
        run: |
          $ErrorActionPreference = 'Stop'
          $source = Join-Path $env:RUNNER_TEMP "duckdb-$env:DUCKDB_VERSION"
          git clone --depth 1 --branch "v$env:DUCKDB_VERSION" https://github.com/duckdb/duckdb.git $source
          $actualCommit = (git -C $source rev-parse HEAD).Trim()
          if ($actualCommit -ne $env:DUCKDB_COMMIT) {
            throw "DuckDB source mismatch: expected $env:DUCKDB_COMMIT, got $actualCommit"
          }

          $build = Join-Path $source 'build\arm64-static'
          $cc = (Get-Command aarch64-w64-mingw32-clang.exe).Source
          $cxx = (Get-Command aarch64-w64-mingw32-clang++.exe).Source
          $ar = (Get-Command llvm-ar.exe).Source
          $ranlib = (Get-Command llvm-ranlib.exe).Source
          cmake -S $source -B $build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            "-DCMAKE_C_COMPILER=$cc" `
            "-DCMAKE_CXX_COMPILER=$cxx" `
            "-DCMAKE_AR=$ar" `
            "-DCMAKE_RANLIB=$ranlib" `
            -DBUILD_SHELL=OFF `
            -DBUILD_UNITTESTS=OFF `
            '-DBUILD_EXTENSIONS=parquet;json;icu;autocomplete'
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          # Build only the static targets. Building the default target also
          # produces loadable extensions, which are not part of this binary.
          $env:CMAKE_BUILD_PARALLEL_LEVEL = '2'
          cmake --build $build --target `
            duckdb_static `
            parquet_extension `
            json_extension `
            icu_extension `
            autocomplete_extension `
            core_functions_extension `
            duckdb_generated_extension_loader
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          # Combine DuckDB, its statically linked extensions, and third-party
          # dependencies into the single archive consumed by duckdb-go.
          $bundle = Join-Path $build 'libduckdb_bundle.a'
          $libs = @(
            Get-Item (Join-Path $build 'src\libduckdb_static.a')
            Get-Item (Join-Path $build 'extension\libduckdb_generated_extension_loader.a')
            Get-ChildItem (Join-Path $build 'extension') -Recurse -Filter 'lib*_extension.a'
            Get-ChildItem (Join-Path $build 'third_party') -Recurse -Filter 'libduckdb_*.a'
          ) | Sort-Object FullName -Unique
          $mri = @("CREATE $($bundle.Replace('\', '/'))")
          foreach ($lib in $libs) {
            $mri += "ADDLIB $($lib.FullName.Replace('\', '/'))"
          }
          $mri += 'SAVE'
          $mri += 'END'
          $mri -join "`n" | & $ar -M
          if ($LASTEXITCODE -ne 0 -or -not (Test-Path $bundle)) {
            throw 'Failed to create the static DuckDB bundle'
          }

      - name: Build
        env:
          GOOS: windows
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '1'
          CGO_CFLAGS: "${{ matrix.goarch == 'arm64' && format('-I{0}/sqlite-include -fgnu89-inline', runner.temp) || '-IC:/msys64/mingw64/include -fgnu89-inline' }}"
          CGO_LDFLAGS: "${{ matrix.goarch == 'arm64' && format('-L{0}/duckdb-1.5.4/build/arm64-static -lduckdb_bundle -lws2_32 -lwsock32 -lrstrtmgr -lstdc++ -lm --static -Wl,--allow-multiple-definition', runner.temp) || '-Wl,--allow-multiple-definition' }}"
          GO_TAGS: "${{ matrix.goarch == 'arm64' && 'fts5 sqlite_vec duckdb_use_static_lib' || 'fts5 sqlite_vec' }}"
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"

          mkdir -p dist
          LDFLAGS="-s -w -X go.kenn.io/msgvault/cmd/msgvault/cmd.Version=v${VERSION} -X go.kenn.io/msgvault/cmd/msgvault/cmd.Commit=$(printf '%s' "$GITHUB_SHA" | cut -c1-8) -X go.kenn.io/msgvault/cmd/msgvault/cmd.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          go build -tags "$GO_TAGS" -trimpath -ldflags="$LDFLAGS" -o dist/msgvault.exe ./cmd/msgvault

          # Smoke test
          echo "--- Smoke test ---"
          SMOKE_OUT=$(dist/msgvault.exe version 2>&1)
          echo "$SMOKE_OUT"
          echo "$SMOKE_OUT" | grep -q "v${VERSION}" || { echo "FATAL: version output doesn't match tag"; exit 1; }

          # Exercise the production DuckDB cache path on the native ARM64
          # runner, not just DLL loading and CLI startup.
          if [[ "${{ matrix.goarch }}" == "arm64" ]]; then
            SMOKE_HOME="$RUNNER_TEMP/msgvault-duckdb-smoke"
            dist/msgvault.exe --home "$SMOKE_HOME" init-db
            dist/msgvault.exe --home "$SMOKE_HOME" build-cache --full-rebuild
            dist/msgvault.exe --home "$SMOKE_HOME" serve stop || true
          fi

          node scripts/check-web-assets.mjs --binary dist/msgvault.exe \
            --json "dist/web-assets-windows-${{ matrix.goarch }}.json"

          # Package as zip
          ARCHIVE="msgvault_${VERSION}_windows_${{ matrix.goarch }}.zip"
          cd dist
          powershell -Command "Compress-Archive -Path msgvault.exe -DestinationPath '$ARCHIVE'"
          rm msgvault.exe

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: msgvault-windows-${{ matrix.goarch }}
          path: |
            dist/*.zip
            dist/web-assets-*.json

  release:
    needs: [build-web, build-linux, build-darwin, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: msgvault-*
          path: artifacts
          merge-multiple: true

      - name: Validate artifacts
        run: |
          echo "--- Comparing embedded web manifests ---"
          manifest_count=0
          reference_manifest=""
          for manifest in artifacts/web-assets-*.json; do
            test -f "$manifest" || { echo "FATAL: release web manifests are missing"; exit 1; }
            manifest_count=$((manifest_count + 1))
            if [ -z "$reference_manifest" ]; then
              reference_manifest="$manifest"
            else
              cmp "$reference_manifest" "$manifest" || {
                echo "FATAL: web asset manifests differ: $reference_manifest and $manifest"
                exit 1
              }
            fi
          done
          test "$manifest_count" -eq 6 || { echo "FATAL: expected 6 platform manifests, found $manifest_count"; exit 1; }

          echo "--- Validating all archives ---"
          for archive in artifacts/*.tar.gz; do
            echo "Checking $archive..."
            tmpdir=$(mktemp -d)
            tar -xzf "$archive" -C "$tmpdir"
            test -f "$tmpdir/msgvault" || { echo "FATAL: msgvault binary missing from $archive"; exit 1; }
            test -x "$tmpdir/msgvault" || { echo "FATAL: msgvault binary not executable in $archive"; exit 1; }

            # Smoke test linux amd64 artifact (runs natively on ubuntu runner)
            if echo "$archive" | grep -q "linux_amd64"; then
              "$tmpdir/msgvault" version > /tmp/smoke_out.txt 2>&1
              cat /tmp/smoke_out.txt
              VERSION="${GITHUB_REF#refs/tags/v}"
              grep -q "v${VERSION}" /tmp/smoke_out.txt || { echo "FATAL: extracted linux_amd64 binary version mismatch"; exit 1; }

              smoke_home=$(mktemp -d)
              smoke_pid=""
              cleanup_smoke() {
                if [ -n "$smoke_pid" ]; then
                  kill "$smoke_pid" 2>/dev/null || true
                  wait "$smoke_pid" 2>/dev/null || true
                fi
                rm -rf "$smoke_home"
              }
              trap cleanup_smoke EXIT
              printf '[server]\napi_port = 0\nbind_addr = "127.0.0.1"\n' > "$smoke_home/config.toml"
              MSGVAULT_HOME="$smoke_home" "$tmpdir/msgvault" serve > "$smoke_home/serve.log" 2>&1 &
              smoke_pid=$!
              attempt=0
              smoke_url=""
              while [ "$attempt" -lt 60 ]; do
                attempt=$((attempt + 1))
                smoke_url=$(sed -n 's/^  API server: //p' "$smoke_home/serve.log" | tail -1)
                if [ -n "$smoke_url" ] && curl -fsS "$smoke_url/" > "$smoke_home/index.html"; then
                  break
                fi
                sleep 0.25
              done
              test -s "$smoke_home/index.html" || { cat "$smoke_home/serve.log"; echo "FATAL: embedded shell was not served"; exit 1; }
              asset=$(grep -oE '/assets/[^" ]+\.(js|css)' "$smoke_home/index.html" | head -1)
              test -n "$asset" || { cat "$smoke_home/index.html"; echo "FATAL: shell did not reference a hashed asset"; exit 1; }
              curl -fsS "$smoke_url$asset" > "$smoke_home/asset"
              test -s "$smoke_home/asset" || { echo "FATAL: embedded asset was empty"; exit 1; }
              cleanup_smoke
              trap - EXIT
              echo "  linux_amd64 smoke: OK"
            fi

            file "$tmpdir/msgvault"
            rm -rf "$tmpdir"
            echo "  OK"
          done

          for archive in artifacts/*.zip; do
            [ -e "$archive" ] || continue
            echo "Checking $archive..."
            tmpdir=$(mktemp -d)
            unzip -q "$archive" -d "$tmpdir"
            test -f "$tmpdir/msgvault.exe" || { echo "FATAL: msgvault.exe missing from $archive"; exit 1; }
            file "$tmpdir/msgvault.exe"
            test ! -f "$tmpdir/duckdb.dll" || { echo "FATAL: unexpected duckdb.dll in $archive"; exit 1; }
            rm -rf "$tmpdir"
            echo "  OK"
          done

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum -- ./*.tar.gz ./*.zip > SHA256SUMS
          cat SHA256SUMS

      - name: Get tag message
        id: tag_message
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"

          TAG_TYPE=$(git cat-file -t "$TAG_NAME")
          if [ "$TAG_TYPE" != "tag" ]; then
            echo "Warning: $TAG_NAME is a lightweight tag, using auto-generated notes"
            echo "has_body=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TAG_MSG=$(git tag -l --format='%(contents:body)' "$TAG_NAME")

          if [ -n "$TAG_MSG" ]; then
            DELIM="TAGMSG_$(date +%s%N)"
            {
              echo "body<<$DELIM"
              echo "$TAG_MSG"
              echo "$DELIM"
              echo "has_body=true"
            } >> "$GITHUB_OUTPUT"
          else
            echo "has_body=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/SHA256SUMS
          body: ${{ steps.tag_message.outputs.has_body == 'true' && steps.tag_message.outputs.body || '' }}
