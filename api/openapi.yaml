      type: object
    SourceStatusResponse:
      additionalProperties: true
      properties:
        sources:
          items:
            $ref: "#/components/schemas/SourceStatus"
          type:
            - array
            - "null"
      required:
        - sources
      type: object
    SourcesRequest:
      additionalProperties: false
      properties:
        accounts:
          items:
            type: string
          type:
            - array
            - "null"
      required:
        - accounts
      type: object
    StageDeletionFilter:
      additionalProperties: false
      properties:
        after:
          type: string
        before:
          type: string
        domain:
          type: string
        label:
          type: string
        recipient:
          type: string
        recipient_name:
          type: string
        sender:
          type: string
        sender_name:
          type: string
        source_id:
          format: int64
          type: integer
      type: object
    StageDeletionRequest:
      additionalProperties: false
      properties:
        description:
          type: string
        dry_run:
          type: boolean
        filter:
          $ref: "#/components/schemas/StageDeletionFilter"
        message_ids:
          items:
            format: int64
            type: integer
          type:
            - array
            - "null"
        operation_token:
          type: string
        selection:
          $ref: "#/components/schemas/ExploreSelection"
      type: object
    StageDeletionResponse:
      additionalProperties: true
      properties:
        account:
          type: string
        dry_run:
          type: boolean
        id:
          type: string
        message_count:
          format: int64
          type: integer
        sample_gmail_ids:
          items:
            type: string
          type:
            - array
            - "null"
        status:
          type: string
      required:
        - dry_run
        - message_count
      type: object
    StatsResponse:
      additionalProperties: true
      properties:
        active_messages:
          format: int64
          type: integer
        database_size_bytes:
          format: int64
          type: integer
        source_deleted_messages:
          format: int64
          type: integer
        total_accounts:
          format: int64
          type: integer
        total_attachments:
          format: int64
          type: integer
        total_labels:
          format: int64
          type: integer
        total_messages:
          format: int64
          type: integer
        total_threads:
          format: int64
          type: integer
        vector_search:
          $ref: "#/components/schemas/StatsView"
        vector_status:
          type: string
      required:
        - total_messages
        - active_messages
        - source_deleted_messages
        - total_threads
        - total_accounts
        - total_labels
        - total_attachments
        - database_size_bytes
      type: object
    StatsView:
      additionalProperties: true
      properties:
        active_generation:
          $ref: "#/components/schemas/GenerationSummary"
        building_generation:
          $ref: "#/components/schemas/BuildingSummary"
        enabled:
          type: boolean
        missing_embeddings_total:
          format: int64
          type: integer
      required:
        - enabled
        - active_generation
        - missing_embeddings_total
      type: object
    StatusMessageResponse:
      additionalProperties: true
      properties:
        message:
          type: string
        status:
          type: string
      required:
        - status
        - message
      type: object
    Summary:
      additionalProperties: false
      properties:
        accounts:
          items:
            type: string
          type:
            - array
            - "null"
        date_range:
          items:
            type: string
          maxItems: 2
          minItems: 2
          type:
            - array
            - "null"
        message_count:
          format: int64
          type: integer
        top_senders:
          items:
            $ref: "#/components/schemas/SenderCount"
          type:
            - array
            - "null"
        total_size_bytes:
          format: int64
          type: integer
      required:
        - message_count
        - total_size_bytes
        - date_range
        - accounts
        - top_senders
      type: object
    SyncRunItemStatus:
      additionalProperties: true
      properties:
        created_at:
          type: string
        error_kind:
          type: string
        error_message:
          type: string
        phase:
          type: string
        source_message_id:
          type: string
      required:
        - source_message_id
        - phase
        - error_kind
        - error_message
        - created_at
      type: object
    SyncRunStatus:
      additionalProperties: true
      properties:
        completed_at:
          type:
            - string
            - "null"
        cursor_after:
          type:
            - string
            - "null"
        cursor_before:
          type:
            - string
            - "null"
        error_message:
          type:
            - string
            - "null"
        errors_count:
          format: int64
          type: integer
        id:
          format: int64
          type: integer
        item_errors:
          items:
            $ref: "#/components/schemas/SyncRunItemStatus"
          type:
            - array
            - "null"
        messages_added:
          format: int64
          type: integer
        messages_processed:
          format: int64
          type: integer
        messages_updated:
          format: int64
          type: integer
        skipped_count:
          format: int64
          type: integer
        source_id:
          format: int64
          type: integer
        started_at:
          type: string
        status:
          type: string
      required:
        - id
        - source_id
        - started_at
        - completed_at
        - status
        - messages_processed
        - messages_added
        - messages_updated
        - errors_count
        - error_message
        - cursor_before
        - cursor_after
      type: object
    TaskIntegrationStatusResponse:
      additionalProperties: true
      properties:
        message:
          description: Credential-free status explanation
          type: string
        project:
          description: Configured project when available
          type: string
        security_note:
          description: Platform-specific local socket security limitation
          type: string
        state:
          description: Current task integration state
          enum:
            - disabled
            - not_found
            - authentication_required
            - unreachable
            - incompatible
            - wrong_project
            - ready
          type: string
      required:
        - state
        - message
      type: object
    TaskLinkLookupResponse:
      additionalProperties: true
      properties:
        complete:
          type: boolean
        last_scan:
          format: date-time
          type: string
        outbound_metadata:
          $ref: "#/components/schemas/TaskLinkOutboundMetadata"
        reason:
          type: string
        remote_revision:
          type: string
        state:
          type: string
        tasks:
          items:
            $ref: "#/components/schemas/TaskSummary"
          type: array
      required:
        - tasks
        - outbound_metadata
        - state
        - complete
        - last_scan
      type: object
    TaskLinkMutationRequest:
      additionalProperties: false
      properties:
        added_at:
          description: Browser-generated retry-stable RFC3339 timestamp for the outbound mail link
          type: string
        description:
          type: string
        labels:
          items:
            type: string
          type:
            - array
            - "null"
        priority:
          type: string
        task_id:
          description: Existing task to link; omit to create a task
          type: string
        title:
          type: string
      required:
        - added_at
      type: object
    TaskLinkMutationResponse:
      additionalProperties: true
      properties:
        task:
          $ref: "#/components/schemas/TaskLinkTask"
      required:
        - task
      type: object
    TaskLinkOutboundMetadata:
      additionalProperties: true
      properties:
        archive_uid:
          type: string
        conversation_id:
          format: int64
          type: integer
        from:
          type: string
        message_id:
          format: int64
          type: integer
        sent_at:
          type: string
        source_identifier:
          type: string
        source_message_id:
          type: string
        source_type:
          type: string
        subject:
          type: string
      required:
        - archive_uid
        - message_id
        - conversation_id
        - subject
        - from
        - sent_at
        - source_type
        - source_identifier
        - source_message_id
      type: object
    TaskLinkTask:
      additionalProperties: true
      properties:
        id:
          type: string
        project:
          type: string
        revision:
          type: string
        title:
          type: string
      required:
        - id
        - project
        - title
      type: object
    TaskSearchResponse:
      additionalProperties: true
      properties:
        tasks:
          items:
            $ref: "#/components/schemas/TaskSummary"
          type:
            - array
            - "null"
      required:
        - tasks
      type: object
    TaskSummary:
      additionalProperties: true
      properties:
        id:
          type: string
        revision:
          type: string
        title:
          type: string
      required:
        - id
        - title
      type: object
    TextConversationRow:
      additionalProperties: true
      properties:
        conversation_id:
          format: int64
          type: integer
        last_message_at:
          type: string
        last_preview:
          type: string
        message_count:
          format: int64
          type: integer
        participant_count:
          format: int64
          type: integer
        source_type:
          type: string
        title:
          type: string
      required:
        - conversation_id
        - title
        - source_type
        - message_count
        - participant_count
        - last_preview
      type: object
    TextConversationsResponse:
      additionalProperties: true
      properties:
        conversations:
          items:
            $ref: "#/components/schemas/TextConversationRow"
          type:
            - array
            - "null"
        count:
          format: int64
          type: integer
        has_more:
          type: boolean
        limit:
          format: int64
          type: integer
        offset:
          format: int64
          type: integer
      required:
        - count
        - has_more
        - offset
        - limit
        - conversations
      type: object
    TextMessagesResponse:
      additionalProperties: true
      properties:
        count:
          format: int64
          type: integer
        has_more:
          type: boolean
        limit:
          format: int64
          type: integer
        messages:
          items:
            $ref: "#/components/schemas/CLIQueryMessageSummary"
          type:
            - array
            - "null"
        offset:
          format: int64
          type: integer
      required:
        - count
        - has_more
        - offset
        - limit
        - messages
      type: object
    TimelineRow:
      additionalProperties: true
      properties:
        anchor_message_id:
          format: int64
          type: integer
        conversation_id:
          format: int64
          type: integer
        first_at:
          format: date-time
          type: string
        has_attachments:
          type: boolean
        key:
          type: string
        kind:
          type: string
        message_count:
          format: int64
          type: integer
        occurred_at:
          format: date-time
          type: string
        preview:
          type: string
        source_id:
          format: int64
          type: integer
        title:
          type: string
      required:
        - key
        - kind
        - title
        - preview
        - occurred_at
        - message_count
        - source_id
        - has_attachments
      type: object
    TokenUploadRequest:
      additionalProperties: false
      properties:
        access_token:
          type: string
        client_id:
          type: string
        expiry:
          format: date-time
          type: string
        refresh_token:
          type: string
        scopes:
          items:
            type: string
          type:
            - array
            - "null"
        tenant_id:
          type: string
        token_type:
          type: string
      required:
        - refresh_token
      type: object
    TotalStatsResponse:
      additionalProperties: true
      properties:
        account_count:
          format: int64
          type: integer
        active_messages:
          format: int64
          type: integer
        applied_search_scope:
          type: boolean
        applied_source_ids:
          items:
            format: int64
            type: integer
          type:
            - array
            - "null"
        attachment_count:
          format: int64
          type: integer
        attachment_size:
          format: int64
          type: integer
        label_count:
          format: int64
          type: integer
        message_count:
          format: int64
          type: integer
        source_deleted_messages:
          format: int64
          type: integer
        total_size:
          format: int64
          type: integer
      required:
        - message_count
        - active_messages
        - source_deleted_messages
        - total_size
        - attachment_count
        - attachment_size
        - label_count
        - account_count
      type: object
    UpdateRequest:
      additionalProperties: false
      properties:
        display_name:
          type: string
        email:
          type: string
      required:
        - email
        - display_name
      type: object
    UpdateResult:
      additionalProperties: true
      properties:
        display_name:
          type: string
        email:
          type: string
      required:
        - email
        - display_name
      type: object
    VectorHealth:
      additionalProperties: true
      properties:
        error:
          type: string
        status:
          type: string
      required:
        - status
      type: object
  securitySchemes:
    apiKey:
      in: header
      name: X-Api-Key
      type: apiKey
info:
  title: msgvault API
  version: 1.31.0
openapi: 3.1.0
paths:
  /api/ping:
    get:
      operationId: daemonPing
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PingInfo"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Daemon discovery ping
      tags:
        - Daemon
  /api/session:
    delete:
      operationId: logoutSession
      responses:
        "204":
          description: No Content
        "429":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Delete the current browser session
      tags:
        - Session
    get:
      operationId: getSession
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionStatus"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Get browser authentication status
      tags:
        - Session
  /api/session/login:
    post:
      operationId: loginSession
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionLoginRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionStatus"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Create an in-memory browser session
      tags:
        - Session
  /api/v1/accounts:
    get:
      operationId: listAccounts
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountListResponse"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      security:
        - apiKey: []
      summary: List scheduler-configured accounts (with sync schedules); use /cli/accounts for all archived sources
      tags:
        - API
    post:
      operationId: addAccount
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddAccountRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusMessageResponse"
          description: OK
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusMessageResponse"
          description: Created
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      security:
        - apiKey: []
      summary: Add an account
      tags:
        - API
  /api/v1/aggregates:
    get:
      operationId: getAggregates
      parameters:
        - description: Aggregate view type
          in: query
          name: view_type
          schema:
            type: string
        - description: "Sort field: count, size, attachment_size, or name"
          in: query
          name: sort
          schema:
            type: string
        - description: "Sort direction: asc or desc"
          in: query
          name: direction
          schema:
            type: string
        - description: Maximum number of rows to return (default 100; values below 1 fall back to the default)
          in: query
          name: limit
          schema:
            format: int64
            type: integer
        - description: Time bucket granularity
          in: query
          name: time_granularity
          schema:
            type: string
        - description: Source ID
          in: query
          name: source_id
          schema:
            format: int64
            type: integer
        - description: Only include messages with attachments
          in: query
          name: attachments_only
          schema:
            type: boolean
        - description: Exclude deleted messages
          in: query
          name: hide_deleted
          schema:
            type: boolean
        - description: Search query
          in: query
          name: search_query
          schema:
            type: string
        - description: Lower date/time bound (RFC3339 or YYYY-MM-DD)
          in: query
          name: after
          schema:
            type: string
        - description: Upper date/time bound (RFC3339 or YYYY-MM-DD)
          in: query
          name: before
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AggregateResponse"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      security:
        - apiKey: []
      summary: Get aggregate rows
      tags:
        - API
  /api/v1/aggregates/sub:
    get:
      operationId: getSubAggregates
      parameters:
        - description: Aggregate view type
          in: query
          name: view_type
          required: true
          schema:
            type: string
        - description: "Sort field: count, size, attachment_size, or name"
          in: query
          name: sort
          schema:
            type: string
        - description: "Sort direction: asc or desc"
          in: query
          name: direction
          schema:
            type: string
        - description: Maximum number of rows to return (default 100; values below 1 fall back to the default)
          in: query
          name: limit
          schema:
            format: int64
            type: integer
        - description: Time bucket granularity
          in: query
          name: time_granularity
          schema:
            type: string
        - description: Source ID
          in: query
          name: source_id
          schema:
            format: int64
            type: integer
        - description: Only include messages with attachments
          in: query
          name: attachments_only
          schema:
            type: boolean
        - description: Exclude deleted messages
          in: query
          name: hide_deleted
          schema:
            type: boolean
        - description: Search query
          in: query
          name: search_query
          schema:
            type: string
        - description: Lower date/time bound (RFC3339 or YYYY-MM-DD)
          in: query
          name: after
          schema:
            type: string
        - description: Upper date/time bound (RFC3339 or YYYY-MM-DD)
          in: query
          name: before
          schema:
            type: string
        - description: Sender email/address filter
          in: query
          name: sender
          schema:
            type: string
        - description: Sender display-name filter
          in: query
          name: sender_name
          schema:
            type: string
        - description: Recipient email/address filter
          in: query
          name: recipient
          schema:
            type: string
        - description: Recipient display-name filter
          in: query
          name: recipient_name
          schema:
            type: string
        - description: Domain filter
          in: query
          name: domain
          schema:
            type: string
        - description: Label filter
          in: query
          name: label
          schema:
            type: string
        - description: Message type filter
          in: query
          name: message_type
          schema:
            type: string
        - description: Named time period
          in: query
          name: time_period
          schema:
            type: string
        - description: Conversation ID
          in: query
          name: conversation_id
          schema:
            format: int64
            type: integer
        - description: Comma-separated aggregate view names to match empty values
          in: query
          name: empty_targets
          schema:
            type: string
        - description: Zero-based row offset
          in: query
          name: offset
          schema:
            format: int64
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AggregateResponse"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      security:
        - apiKey: []
      summary: Get nested aggregate rows
      tags:
        - API
  /api/v1/attachments/{hash}/content:
    get:
      operationId: getAttachmentContent
      parameters:
        - description: Attachment SHA-256 content hash
          in: path
          name: hash
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            "*/*":
              schema:
                contentMediaType: application/octet-stream
                format: binary
                type: string
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
        "503":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      security:
        - apiKey: []
      summary: Download attachment content by SHA-256 hash
      tags:
        - API
  /api/v1/attachments/{id}:
    get:
      operationId: getAttachment
      parameters:
        - description: Attachment ID
          in: path
          name: id
          required: true
          schema:
            format: int64
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttachmentInfo"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      security:
        - apiKey: []
      summary: Get attachment metadata
      tags:
        - API
  /api/v1/auth/token/{email}:
    post:
      operationId: uploadToken
      parameters:
        - description: Account email address
          in: path
          name: email
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenUploadRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusMessageResponse"
          description: Created
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      security:
        - apiKey: []
      summary: Upload an OAuth token
      tags:
        - API
  /api/v1/backup/freeze/begin:
    post:
      operationId: beginBackupFreeze
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackupFreezeBeginResponse"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      security:
        - apiKey: []
      summary: Begin a backup freeze window
      tags:
        - API
  /api/v1/backup/freeze/end:
    post:
      operationId: endBackupFreeze
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BackupFreezeEndRequest"
